<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev1ls — Desarrollador</title>
    <meta name="description" content="dev1ls — Desarrollador full-stack, BSD & Linux user.">
    <meta property="og:title" content="dev1ls">
    <meta property="og:description" content="Desarrollador full-stack, BSD & Linux user.">
    <meta property="og:image" content="https://res.cloudinary.com/djeqn9kjl/image/upload/v1781920013/eric_oumzl2.png">
    <meta property="og:url" content="https://dev1lsconf.github.io">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👹</text></svg>">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #111;
            --muted: #666;
            --faint: #999;
            --line: #e0e0e0;
            --icon-email: #666;
            --icon-x: #000;
            --icon-masto: #6364FF;
            --icon-gh: #181717;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --fg: #f0f0f0;
                --muted: #999;
                --faint: #555;
                --line: #222;
                --icon-email: #999;
                --icon-x: #fff;
                --icon-masto: #8b8dff;
                --icon-gh: #fff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2rem;
            border: 1px solid var(--line);
            transition: opacity 0.3s ease;
        }

        .avatar:hover {
            opacity: 0.7;
        }

        .logo {
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--fg);
            user-select: none;
            line-height: 1;
        }

        .bio {
            margin-top: 0.75rem;
            font-size: 1.15rem;
            color: var(--muted);
        }

        .links {
            margin-top: 2rem;
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .links a {
            text-decoration: none;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
        }

        .links a:hover {
            opacity: 0.6;
        }

        .links svg {
            width: 32px;
            height: 32px;
        }

        .section {
            margin-top: 1.5rem;
            max-width: 540px;
            width: 100%;
            padding: 0 1rem;
            display: none;
        }

        .section.visible {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--faint);
            margin-bottom: 0.75rem;
            text-align: center;
        }

        .section-list {
            list-style: none;
            text-align: center;
        }

        .section-list li {
            margin-bottom: 0.5rem;
        }

        .section-list a {
            color: var(--muted);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .section-list a:hover {
            color: var(--fg);
        }

        .section-list .date {
            font-size: 0.7rem;
            color: var(--faint);
        }

        @media (max-width: 768px) {
            .logo { font-size: 4.5rem; }
            .avatar { width: 130px; height: 130px; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 3rem; }
            .avatar { width: 100px; height: 100px; }
            .links { gap: 2rem; }
            .links svg { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>
    <img class="avatar" src="https://res.cloudinary.com/djeqn9kjl/image/upload/v1781920013/eric_oumzl2.png" alt="avatar" loading="lazy">
    <div class="logo">dev1ls</div>
    <div class="bio">full-stack developer · bsd &amp; linux</div>

    <div class="links">
        <a href="mailto:dev1ls@sdf.org" aria-label="Email">
            <svg viewBox="0 0 24 24" fill="var(--icon-email)"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </a>
        <a href="https://x.com/dev1lsconf" target="_blank" aria-label="X">

        </a>
        <a href="https://mastodon.sdf.org/@dev1ls" target="_blank" rel="me" aria-label="Mastodon">
            <svg viewBox="0 0 24 24" fill="var(--icon-masto)"><path d="M23.268 5.313c-.35-2.578-2.617-4.61-5.304-5.004C17.51.242 15.792 0 11.813 0h-.03c-3.98 0-4.835.242-5.288.309C3.882.692 1.496 2.518.917 5.127.64 6.412.61 7.837.66 9.143c.074 1.874.088 3.745.26 5.611.118 1.24.325 2.47.62 3.68.55 2.243 2.766 4.765 5.195 5.532 1.422.45 2.963.58 4.447.472.93-.069 1.54-.086 2.725-.064 1.396-.03 2.523-.17 3.78-.493 1.937-.498 3.903-2.055 4.626-3.96.344-.905.542-1.927.62-2.92.008-.095.084-.903.106-1.12.006-.06.05-.102.106-.095.59.064 1.153.117 1.682.157.986.074 1.938.019 2.873-.162 1.29-.25 2.436-.83 3.196-1.762.754-.924.998-2.17.854-3.392-.132-1.118-.582-1.952-1.207-2.618-.388-.414-.9-.78-1.03-1.06-.198-.43-.225-1.09-.14-1.607.006-.034.008-.07.006-.105-.076-.986-.154-1.968-.236-2.95zm-5.036 5.099v4.116h-2.074V8.86c0-.582-.233-1.088-.701-1.448-.468-.36-1.092-.538-1.885-.538-1.34 0-2.132.867-2.132 2.498v3.625h-2.06V9.371c0-1.631-.793-2.498-2.138-2.498-.788 0-1.413.177-1.881.538-.468.36-.707.866-.707 1.448v3.668H5.22V10.41c0-.582.089-1.104.267-1.566.184-.462.442-.857.768-1.186.326-.33.702-.584 1.122-.767.42-.183.878-.27 1.367-.27.649 0 1.186.198 1.608.588.421.39.698.922.83 1.587l.442 1.545.442-1.545c.132-.665.409-1.196.83-1.587.422-.39.959-.589 1.614-.589.483 0 .938.088 1.361.27.423.184.799.438 1.122.768.326.33.584.724.768 1.186.178.462.267.984.267 1.566z"/></svg>

        </a>
    </div>

    <div class="section" id="posts">
        <div class="section-title">Últimos posts</div>
        <ul class="section-list" id="postsList"></ul>
    </div>

    <div class="section" id="repos">
        <div class="section-title">Repos</div>
        <ul class="section-list" id="reposList"></ul>
    </div>

    <script>
        async function loadPosts() {
            try {
                const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://dev1ls.deno.dev/feed'));
                if (!res.ok) throw new Error();
                const xml = await res.text();
                const doc = new DOMParser().parseFromString(xml, 'text/xml');
                const entries = doc.querySelectorAll('entry');
                const list = document.getElementById('postsList');
                let count = 0;
                for (const entry of entries) {
                    if (count >= 3) break;
                    const title = entry.querySelector('title')?.textContent || '';
                    const link = entry.querySelector('link')?.getAttribute('href') || '';
                    const pub = entry.querySelector('published')?.textContent || '';
                    const date = pub ? new Date(pub).toLocaleDateString('es-ES', { year: 'numeric', month: 'short' }) : '';
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${link}" target="_blank">${title} <span class="date">${date}</span></a>`;
                    list.appendChild(li);
                    count++;
                }
                if (count) document.getElementById('posts').classList.add('visible');
            } catch (_) {}
        }

        async function loadRepos() {
            try {
                const res = await fetch('https://api.github.com/users/dev1lsconf/repos?sort=updated&per_page=4&type=public');
                if (!res.ok) throw new Error();
                const repos = await res.json();
                const list = document.getElementById('reposList');
                repos.slice(2).forEach(r => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${r.html_url}" target="_blank">${r.name}</a>`;
                    list.appendChild(li);
                });
                if (repos.length) document.getElementById('repos').classList.add('visible');
            } catch (_) {}
        }

        document.addEventListener('DOMContentLoaded', () => { loadPosts(); loadRepos(); });
    </script>
</body>
</html>
