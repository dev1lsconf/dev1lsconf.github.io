<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev1ls</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 2rem;
            border: 1px solid #e0e0e0;
            transition: opacity 0.3s ease;
        }

        .avatar:hover {
            opacity: 0.7;
        }

        .logo {
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: #000;
            user-select: none;
            line-height: 1;
        }

        .links {
            margin-top: 2rem;
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }

        .links a {
            color: #999;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: #000;
        }

        .dialog {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #f5f5f5;
            color: #999;
            padding: 0.4rem 1.25rem;
            border: 1px solid #e0e0e0;
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 100;
            user-select: none;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 4.5rem;
            }
            .avatar {
                width: 130px;
                height: 130px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 3rem;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .links {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dialog">en construcción</div>
    <img class="avatar" src="https://res.cloudinary.com/djeqn9kjl/image/upload/v1781920013/eric_oumzl2.png" alt="avatar">
    <div class="logo">dev1ls</div>
    <div class="links">
        <a href="https://x.com/dev1lsconf" target="_blank">X</a>
        <a href="https://mastodon.sdf.org/@dev1ls" target="_blank">Mastodon</a>
    </div>
</body>
</html>
